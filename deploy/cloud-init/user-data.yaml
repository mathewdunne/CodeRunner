#cloud-config
# CodeRunner GCE first-boot provisioning.
#
# This file is templated by Terraform: ${domain}, ${git_ref}, ${github_repo}
# are substituted in vm.tf via templatefile(). Anything secret comes from Secret
# Manager at runtime via render-env.sh — NOT from this file.

write_files:
  - path: /etc/coderunner/deploy.env
    permissions: "0644"
    content: |
      DOMAIN=${domain}
      GITHUB_REPO=${github_repo}
      INITIAL_GIT_REF=${git_ref}
      APP_DIR=/opt/coderunner/app
      DATA_DIR=/var/lib/coderunner/data
      APP_USER=coderunner
      WORKSPACE_IMAGE=${workspace_image}

  - path: /opt/coderunner/render-env.sh
    permissions: "0750"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      # Materialize /opt/coderunner/.env and /etc/alloy/config.alloy from Secret
      # Manager. Runs from bootstrap.sh on first boot and from the VM's
      # metadata_startup_script on every subsequent boot.
      #
      # Exit codes:
      #   0  — all required secrets fetched; .env and alloy config written
      #   1  — one or more required secrets missing, OR a fetch hit a
      #        non-NOT_FOUND error (auth/IAM/network). The existing .env is
      #        NOT overwritten on failure, so a transient gcloud blip can't
      #        wipe a previously-working config.
      set -euo pipefail
      shopt -s inherit_errexit
      source /etc/coderunner/deploy.env

      # Distinguish "no version added yet" (first-boot, soft) from real errors
      # (auth, IAM, network — hard). Hard errors propagate; soft returns empty
      # and lets the post-fetch validation produce a single clear message.
      fetch() {
        local name="$1" out rc=0
        out="$(gcloud secrets versions access latest --secret="$name" 2>&1)" || rc=$?
        if [ $rc -eq 0 ]; then
          printf '%s' "$out"
          return 0
        fi
        if echo "$out" | grep -qE 'NOT_FOUND|no versions|does not exist'; then
          printf ''
          return 0
        fi
        echo "render-env: hard error fetching $name: $out" >&2
        return 1
      }

      BETTER_AUTH_SECRET="$(fetch coderunner-better-auth-secret)"
      GH_CLIENT_ID="$(fetch coderunner-github-client-id)"
      GH_CLIENT_SECRET="$(fetch coderunner-github-client-secret)"
      GOOG_CLIENT_ID="$(fetch coderunner-google-client-id)"
      GOOG_CLIENT_SECRET="$(fetch coderunner-google-client-secret)"
      ADMIN_TOKEN_VAL="$(fetch coderunner-admin-token)"
      METRICS_TOKEN_VAL="$(fetch coderunner-metrics-token)"
      GC_URL="$(fetch coderunner-grafana-cloud-url)"
      GC_USER="$(fetch coderunner-grafana-cloud-user)"
      GC_TOKEN="$(fetch coderunner-grafana-cloud-token)"

      required=(
        BETTER_AUTH_SECRET GH_CLIENT_ID GH_CLIENT_SECRET
        GOOG_CLIENT_ID GOOG_CLIENT_SECRET ADMIN_TOKEN_VAL METRICS_TOKEN_VAL
        GC_URL GC_USER GC_TOKEN
      )
      missing=()
      for n in "$${required[@]}"; do
        if [ -z "$${!n}" ]; then
          missing+=("$n")
        fi
      done
      if [ "$${#missing[@]}" -gt 0 ]; then
        echo "render-env: missing secrets: $${missing[*]}" >&2
        echo "  populate via 'gcloud secrets versions add' (deploy/README.md step 5)," >&2
        echo "  then 'gcloud compute instances reset coderunner'." >&2
        exit 1
      fi

      tmp="$(mktemp)"
      chmod 600 "$tmp"
      {
        echo "# Auto-generated by render-env.sh. Do not edit by hand."
        echo "BETTER_AUTH_URL=https://$${DOMAIN}"
        echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET"
        echo "GITHUB_CLIENT_ID=$GH_CLIENT_ID"
        echo "GITHUB_CLIENT_SECRET=$GH_CLIENT_SECRET"
        echo "GOOGLE_CLIENT_ID=$GOOG_CLIENT_ID"
        echo "GOOGLE_CLIENT_SECRET=$GOOG_CLIENT_SECRET"
        echo "ADMIN_TOKEN=$ADMIN_TOKEN_VAL"
        echo "METRICS_TOKEN=$METRICS_TOKEN_VAL"
        echo "FRC_DATA_DIR=$${DATA_DIR}"
        echo "FRC_DB_PATH=$${DATA_DIR}/app.db"
        echo "CODE_IMAGE=$${WORKSPACE_IMAGE}"
        echo "PORT=4000"
        echo "LOG_LEVEL=info"
      } > "$tmp"
      install -o "$${APP_USER}" -g "$${APP_USER}" -m 600 "$tmp" /opt/coderunner/.env
      rm -f "$tmp"

      # Render Alloy config too. Separate file so the metrics token is only
      # readable by the alloy user.
      alloy_tmp="$(mktemp)"
      chmod 600 "$alloy_tmp"
      METRICS_TOKEN="$METRICS_TOKEN_VAL" \
      GC_URL="$GC_URL" \
      GC_USER="$GC_USER" \
      GC_TOKEN="$GC_TOKEN" \
        envsubst < /etc/alloy/config.alloy.tmpl > "$alloy_tmp"
      install -o alloy -g alloy -m 640 "$alloy_tmp" /etc/alloy/config.alloy
      rm -f "$alloy_tmp"

  - path: /etc/systemd/system/coderunner.service
    permissions: "0644"
    content: |
      [Unit]
      Description=CodeRunner control plane
      After=network-online.target docker.service
      Wants=network-online.target docker.service

      [Service]
      Type=simple
      User=coderunner
      Group=coderunner
      WorkingDirectory=/opt/coderunner/app
      EnvironmentFile=/opt/coderunner/.env
      ExecStart=/usr/local/bin/bun run start
      Restart=always
      RestartSec=5
      # Cap thrash if the service somehow keeps crashing — 5 starts in 60s,
      # then back off. With render-env.sh gating in bootstrap.sh the unit
      # shouldn't even be started on first boot before secrets land, but this
      # is the belt against the suspenders.
      StartLimitBurst=5
      StartLimitIntervalSec=60
      LimitNOFILE=65535
      # Don't kill workspace docker containers when this service stops.
      KillMode=mixed
      TimeoutStopSec=30

      [Install]
      WantedBy=multi-user.target

  - path: /etc/alloy/config.alloy.tmpl
    permissions: "0644"
    owner: root:root
    content: |
      // Grafana Alloy config template. render-env.sh substitutes $METRICS_TOKEN,
      // $GC_URL, $GC_USER, $GC_TOKEN at boot and writes /etc/alloy/config.alloy
      // (mode 640 alloy:alloy so the token isn't world-readable).

      logging {
        level  = "info"
        format = "logfmt"
      }

      // ─── Scrape: control plane /metrics (requires bearer auth) ───────
      prometheus.scrape "coderunner" {
        targets = [
          { __address__ = "localhost:4000", job = "coderunner" },
        ]
        metrics_path = "/metrics"
        scrape_interval = "30s"
        bearer_token = "$METRICS_TOKEN"
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
      }

      // ─── Host metrics: CPU, memory, disk, network ────────────────────
      prometheus.exporter.unix "host" {
        include_exporter_metrics = false
      }

      prometheus.scrape "host" {
        targets    = prometheus.exporter.unix.host.targets
        job_name   = "node"
        scrape_interval = "30s"
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
      }

      // ─── Per-container metrics (workspace containers) ────────────────
      prometheus.exporter.cadvisor "containers" {
        docker_host = "unix:///var/run/docker.sock"
      }

      prometheus.scrape "containers" {
        targets    = prometheus.exporter.cadvisor.containers.targets
        job_name   = "cadvisor"
        scrape_interval = "30s"
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
      }

      // ─── Ship to Grafana Cloud ───────────────────────────────────────
      prometheus.remote_write "grafana_cloud" {
        endpoint {
          url = "$GC_URL"
          basic_auth {
            username = "$GC_USER"
            password = "$GC_TOKEN"
          }
        }
        external_labels = {
          instance   = "${instance_label}",
          deployment = "gce",
        }
      }

  - path: /opt/coderunner/bootstrap.sh
    permissions: "0750"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      # First-boot provisioning. Idempotent — safe to re-run.
      #
      # Web bundle + AdvantageScope Lite are NOT built here — they're fetched
      # as prebuilt tarballs by the deploy.yml workflow from each tag's GitHub
      # Release. First-boot before the first deploy will have an empty
      # apps/web/dist; /healthz still works, but / will 404 until the deploy
      # workflow lands artifacts.
      set -euo pipefail
      source /etc/coderunner/deploy.env

      log() { echo "[bootstrap] $*"; }

      # ─── Packages ──────────────────────────────────────────────────────
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -y
      apt-get install -y \
        ca-certificates curl git jq unzip gnupg lsb-release \
        debian-keyring debian-archive-keyring apt-transport-https \
        gettext-base

      # ─── Caddy ─────────────────────────────────────────────────────────
      if ! command -v caddy >/dev/null; then
        log "installing Caddy"
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
          | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
          > /etc/apt/sources.list.d/caddy-stable.list
        apt-get update -y
        apt-get install -y caddy
      fi

      # ─── Docker ────────────────────────────────────────────────────────
      if ! command -v docker >/dev/null; then
        log "installing Docker Engine"
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/debian $(lsb_release -cs) stable" \
          > /etc/apt/sources.list.d/docker.list
        apt-get update -y
        apt-get install -y docker-ce docker-ce-cli containerd.io
      fi

      # ─── Grafana Alloy ─────────────────────────────────────────────────
      if ! command -v alloy >/dev/null; then
        log "installing Grafana Alloy"
        mkdir -p /etc/apt/keyrings
        curl -fsSL https://apt.grafana.com/gpg.key \
          | gpg --dearmor -o /etc/apt/keyrings/grafana.gpg
        echo "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main" \
          > /etc/apt/sources.list.d/grafana.list
        apt-get update -y
        apt-get install -y alloy
      fi

      # ─── App user ──────────────────────────────────────────────────────
      if ! id -u "$${APP_USER}" >/dev/null 2>&1; then
        log "creating $${APP_USER} user"
        useradd --system --create-home --shell /bin/bash --home-dir /home/$${APP_USER} "$${APP_USER}"
      fi
      usermod -aG docker "$${APP_USER}"
      # cadvisor exporter reads /var/run/docker.sock.
      if id -u alloy >/dev/null 2>&1; then
        usermod -aG docker alloy
      fi

      # ─── Data disk ─────────────────────────────────────────────────────
      DEV=/dev/disk/by-id/google-coderunner-data
      if [ -e "$DEV" ]; then
        if ! blkid "$DEV" >/dev/null 2>&1; then
          log "formatting fresh data disk"
          mkfs.ext4 -F -L coderunner-data "$DEV"
        fi
        mkdir -p "$${DATA_DIR}"
        if ! grep -q coderunner-data /etc/fstab; then
          echo "LABEL=coderunner-data $${DATA_DIR} ext4 defaults,nofail 0 2" >> /etc/fstab
        fi
        mount -a
        chown -R "$${APP_USER}:$${APP_USER}" "$${DATA_DIR}"
      else
        log "WARN: data disk not present at $DEV"
      fi

      # ─── App checkout ──────────────────────────────────────────────────
      # Submodules NOT needed at runtime — AdvantageScope Lite is staged
      # under dist/advantagescope from prebuilt tarballs (the vendor/
      # submodule is only used by CI's build:ascope job).
      mkdir -p /opt/coderunner
      chown "$${APP_USER}:$${APP_USER}" /opt/coderunner
      if [ ! -d "$${APP_DIR}/.git" ]; then
        log "cloning repo"
        sudo -u "$${APP_USER}" git clone \
          "https://github.com/$${GITHUB_REPO}.git" "$${APP_DIR}"
        sudo -u "$${APP_USER}" git -C "$${APP_DIR}" checkout "$${INITIAL_GIT_REF}"
      fi
      # data/ inside the repo points at the persistent disk so backups + DB
      # survive VM recreation.
      if [ ! -L "$${APP_DIR}/data" ]; then
        rm -rf "$${APP_DIR}/data"
        sudo -u "$${APP_USER}" ln -s "$${DATA_DIR}" "$${APP_DIR}/data"
      fi

      # ─── Bun (version pinned to package.json's "packageManager") ───────
      # Reading from the cloned repo means bumping packageManager bumps the
      # VM's Bun on next provision — no separate constant to forget.
      BUN_PIN="$(jq -r '.packageManager' "$${APP_DIR}/package.json" \
        | sed -E 's/^bun@/bun-v/')"
      if [ -z "$BUN_PIN" ] || [ "$BUN_PIN" = "bun-vnull" ]; then
        log "ERROR: could not parse bun version from package.json"
        exit 1
      fi
      if ! sudo -u "$${APP_USER}" bash -lc 'command -v bun' >/dev/null 2>&1; then
        log "installing Bun ($BUN_PIN) for $${APP_USER}"
        sudo -u "$${APP_USER}" bash -lc \
          "curl -fsSL https://bun.sh/install | bash -s '$BUN_PIN'"
      fi
      ln -sf /home/$${APP_USER}/.bun/bin/bun /usr/local/bin/bun

      # ─── Pre-pull workspace image (public GHCR — no login) ─────────────
      log "pulling workspace image"
      sudo -u "$${APP_USER}" docker pull "$${WORKSPACE_IMAGE}" || true

      # ─── bun install (runtime deps for the control plane) ──────────────
      # Web/ascope artifacts are NOT built here; the deploy workflow drops
      # prebuilt tarballs into apps/web/dist and dist/advantagescope.
      log "bun install"
      sudo -u "$${APP_USER}" bash -lc "cd $${APP_DIR} && bun install --frozen-lockfile"

      # ─── Caddyfile ─────────────────────────────────────────────────────
      cat > /etc/caddy/Caddyfile <<EOF
      $${DOMAIN} {
        reverse_proxy localhost:4000
        encode gzip
      }
      EOF

      # ─── Enable services; start only if secrets are ready ──────────────
      systemctl daemon-reload
      systemctl enable --now docker

      # Caddy's debian package auto-starts a default Caddyfile on install.
      # Reload (not start) so our just-written Caddyfile is actually loaded.
      systemctl enable caddy
      systemctl reload caddy || systemctl restart caddy

      systemctl enable coderunner alloy
      if /opt/coderunner/render-env.sh; then
        log "secrets present — starting coderunner + alloy"
        systemctl restart coderunner alloy
      else
        log "secrets incomplete — coderunner/alloy ENABLED but not started."
        log "  After 'gcloud secrets versions add ...' (README step 5),"
        log "  run 'gcloud compute instances reset coderunner' (README step 7)."
        log "  The metadata_startup_script will re-render env and start services."
      fi

      log "bootstrap complete"
      touch /var/log/coderunner-bootstrap-done

runcmd:
  - [bash, -lc, "/opt/coderunner/bootstrap.sh 2>&1 | tee -a /var/log/coderunner-bootstrap.log"]
