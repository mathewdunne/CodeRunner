name: Deploy to GCE

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Semver git tag to deploy (for example v2.4.0)"
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  WORKSPACE_IMAGE: ghcr.io/${{ github.repository_owner }}/coderunner-workspace

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      tag_sha: ${{ steps.validate.outputs.tag_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate release tag and main ancestry
        id: validate
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF_NAME_SAFE: ${{ github.ref }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_REF_NAME_SAFE" != "refs/heads/main" ]; then
            echo "Deploy to GCE must be dispatched from refs/heads/main; got $GITHUB_REF_NAME_SAFE."
            exit 1
          fi

          TAG="$INPUT_TAG"
          if ! echo "$TAG" | grep -qE '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'; then
            echo "Refusing to deploy '$TAG'. Expected vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-prerelease; build metadata (+...) is not allowed."
            exit 1
          fi

          git fetch --force origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/tags/$TAG:refs/tags/$TAG"

          TAG_SHA="$(git rev-parse "refs/tags/$TAG^{commit}")"
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "Tag $TAG ($TAG_SHA) is not reachable from origin/main."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_sha=$TAG_SHA" >> "$GITHUB_OUTPUT"

  verify:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          submodules: recursive

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun --bun playwright install chromium

      - name: Verify
        run: bun run verify

  publish:
    needs: [validate, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      TAG: ${{ needs.validate.outputs.tag }}
      TAG_SHA: ${{ needs.validate.outputs.tag_sha }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push workspace image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/code/Dockerfile
          push: true
          tags: |
            ${{ env.WORKSPACE_IMAGE }}:${{ env.TAG }}
            ${{ env.WORKSPACE_IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.TAG_SHA }}
            org.opencontainers.image.version=${{ env.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Cache emsdk
        id: cache-emsdk
        uses: actions/cache@v4
        with:
          path: ~/emsdk
          key: emsdk-4.0.12-${{ runner.os }}

      - name: Install emsdk
        run: |
          set -euo pipefail
          if [ ! -d "$HOME/emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          fi
          cd "$HOME/emsdk"
          ./emsdk install 4.0.12
          ./emsdk activate 4.0.12
          echo "EMSDK=$HOME/emsdk" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: |
          set -euo pipefail
          bun run build:web
          bun run build:ascope
          tar -czf web-dist.tar.gz -C apps/web/dist .
          tar -czf ascope-dist.tar.gz -C dist/advantagescope .

      - name: Upload release artifacts
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --target "$TAG_SHA" \
              --title "$TAG" \
              --notes "CodeRunner release $TAG"
          fi
          gh release upload "$TAG" web-dist.tar.gz ascope-dist.tar.gz --clobber

  deploy-cloudflare:
    needs: [validate, publish, deploy]
    # Only runs when CF_ACCOUNT_ID is set as a repo variable.
    # Depends on deploy (GCE) so the backend is always updated before the
    # frontend goes live — prevents the client from running ahead of the server.
    # Leave CF_ACCOUNT_ID unset to skip this job and use single-machine mode only.
    if: vars.CF_ACCOUNT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG: ${{ needs.validate.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Download web-dist from release
        run: gh release download "$TAG" --pattern web-dist.tar.gz

      - name: Unpack web-dist
        run: mkdir -p apps/web/dist && tar -xzf web-dist.tar.gz -C apps/web/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ vars.CF_ACCOUNT_ID }}
          workingDirectory: deploy/cloudflare
          command: pages deploy --commit-dirty=true

  deploy:
    needs: [validate, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      # Forks deploy by setting these as repo variables (Settings -> Secrets and
      # variables -> Actions -> Variables). Required: GCP_PROJECT, GCP_DEPLOY_SA,
      # GCP_WIF_PROVIDER. Optional: GCP_ZONE, GCP_VM_NAME.
      GCP_PROJECT: ${{ vars.GCP_PROJECT }}
      GCP_ZONE: ${{ vars.GCP_ZONE || 'us-central1-a' }}
      VM_NAME: ${{ vars.GCP_VM_NAME || 'coderunner' }}
      DEPLOY_SA: ${{ vars.GCP_DEPLOY_SA }}
      WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      TAG: ${{ needs.validate.outputs.tag }}
    steps:
      - name: Check required GCP variables
        run: |
          set -euo pipefail
          for var in GCP_PROJECT DEPLOY_SA WIF_PROVIDER; do
            if [ -z "${!var:-}" ]; then
              echo "Missing repo variable: $var. See deploy/README.md for setup."
              exit 1
            fi
          done

      - id: auth
        name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Roll service on VM
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          read -r -d '' DEPLOY_SCRIPT <<EOF || true
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive

          for _ in \$(seq 1 60); do
            test -f /var/log/coderunner-bootstrap-done && break
            sleep 2
          done
          test -f /var/log/coderunner-bootstrap-done

          sudo systemctl stop coderunner

          cd /opt/coderunner/app
          sudo -u coderunner git fetch --tags --depth=1 origin tag $TAG
          sudo -u coderunner git checkout $TAG
          sudo -u coderunner bun install --frozen-lockfile

          RELEASE_URL="https://github.com/$GITHUB_REPO/releases/download/$TAG"
          sudo -u coderunner curl -fsSL -o /tmp/web.tgz "\$RELEASE_URL/web-dist.tar.gz"
          sudo -u coderunner curl -fsSL -o /tmp/ascope.tgz "\$RELEASE_URL/ascope-dist.tar.gz"
          sudo -u coderunner rm -rf apps/web/dist && sudo -u coderunner mkdir -p apps/web/dist
          sudo -u coderunner tar -xzf /tmp/web.tgz -C apps/web/dist
          sudo -u coderunner rm -rf dist/advantagescope && sudo -u coderunner mkdir -p dist/advantagescope
          sudo -u coderunner tar -xzf /tmp/ascope.tgz -C dist/advantagescope
          sudo -u coderunner rm -f /tmp/web.tgz /tmp/ascope.tgz

          sudo -u coderunner docker pull $WORKSPACE_IMAGE:$TAG
          sudo -u coderunner docker tag $WORKSPACE_IMAGE:$TAG $WORKSPACE_IMAGE:latest

          sudo -u coderunner bash -lc 'set -a; source /opt/coderunner/.env; set +a; bun run docker:rebuild-workspaces'

          sudo systemctl start coderunner

          for _ in \$(seq 1 30); do
            if curl -sf http://localhost:4000/healthz >/dev/null; then
              echo "healthz OK"
              exit 0
            fi
            sleep 1
          done
          echo "healthz did not respond within 30s"
          sudo journalctl -u coderunner -n 80 --no-pager || true
          exit 1
          EOF

          gcloud compute ssh "$VM_NAME" \
            --zone="$GCP_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command="$DEPLOY_SCRIPT"
